name: Update WNBA Data

on:
  schedule:
    - cron: "0 10 * * *"

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Diagnose connectivity
        run: |
          echo "=== stats.nba.com (API endpoint) ==="
          curl -v --max-time 15 https://stats.nba.com/stats/leaguedashplayerstats \
            -H "Origin: https://www.nba.com" \
            -H "Referer: https://www.nba.com/" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "x-nba-stats-origin: stats" \
            -H "x-nba-stats-token: true" || true
          echo ""
          echo "=== www.nba.com (general site) ==="
          curl -v --max-time 15 https://www.nba.com || true

      - name: Run scraper
        timeout-minutes: 60
        run: |
          python scrape_wnba.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add wnba_data.csv

          git commit -m "Update WNBA data" || exit 0

          git push