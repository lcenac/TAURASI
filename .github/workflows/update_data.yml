name: Update WNBA Data

on:
  schedule:
    - cron: "0 10 * * *"

  workflow_dispatch:
    inputs:
      attempt:
        description: "Retry attempt number (internal use)"
        required: false
        default: "1"

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        id: run_scraper
        timeout-minutes: 60
        run: |
          python scrape_wnba.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add wnba_data.csv

          git commit -m "Update WNBA data" || exit 0

          git push

      # If the scraper fails (e.g. this runner's IP is currently
      # blocked upstream), dispatch a fresh run on a new runner —
      # which gets a different IP from GitHub's pool. Capped at 3
      # total attempts per day so it can't loop forever.
      - name: Retry on a fresh runner
        if: failure() && steps.run_scraper.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATTEMPT: ${{ github.event.inputs.attempt || '1' }}
        run: |
          if [ "$ATTEMPT" -lt "3" ]; then
            NEXT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT failed — dispatching attempt $NEXT on a fresh runner"
            gh workflow run "${{ github.workflow }}" \
              --ref "${{ github.ref_name }}" \
              -f attempt="$NEXT"
          else
            echo "Reached max attempts (3) for today — giving up"
            exit 1
          fi